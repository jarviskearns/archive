<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #e2dcc4;
      --blue: #0000ff;
      --black: #000000;
      --white: #ffffff;
      --yellow: #ffff00;
      --muted: #d7d1bb;
    }

    @font-face {
      font-family: "LoRes 21 OT";
      src: url("/fonts/LoRes21OT-Regular.woff2") format("woff2"),
        url("/fonts/LoRes21OT-Regular.woff") format("woff");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html {
      background: var(--blue);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--black);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body,
    a,
    button {
      cursor: url("./cursor.png") 5 4, auto;
    }

    a:hover,
    button:hover {
      cursor: url("./cursor.png") 5 4, pointer;
    }

    .top-bar {
      height: 16px;
      background: var(--blue);
      border-bottom: 2px solid var(--black);
    }

    .nav {
      display: flex;
      gap: 22px;
      padding: 14px 22px 6px;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 500;
      flex-wrap: wrap;
      background: var(--bg);
      position: relative;
      z-index: 30;
    }

    .nav a {
      color: var(--black);
      text-decoration: none;
    }

    .nav a:hover {
      background: var(--yellow);
    }

    .frame {
      min-height: calc(100vh - 58px);
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .graphic-stage {
      position: relative;
      min-height: calc(100vh - 58px);
      background: var(--bg);
      overflow: hidden;
    }


    .ui-label,
    .ui-version {
      position: absolute;
      z-index: 7;
      border: 1px solid var(--black);
      padding: 6px 8px 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.15;
    }

    .ui-label {
      top: 34px;
      left: 34px;
      background: var(--white);
      max-width: 220px;
    }

    .ui-version {
      top: 34px;
      right: 34px;
      background: var(--muted);
      max-width: min(34vw, 360px);
      text-align: right;
    }

    .art-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .symbol {
      position: absolute;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .symbol.left {
      left: 8%;
      width: 30%;
      height: 44%;
      top: 35%;
      z-index: 9;
    }

    .symbol.right {
      right: 11%;
      width: 20%;
      height: 34%;
      top: 40%;
      z-index: 9;
    }

    .symbol.center {
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      width: min(72vw, 1350px);
      height: 110%;
      z-index: 2;
    }

    .bitmap-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
      max-height: 100%;
    }

    .bitmap-img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform-origin: center center;
      filter: url(#bitmapTransparentBG);
    }

    .globe-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .globe-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .side-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .side-gif {
      display: block;
      max-width: none;
      max-height: none;
      width: 18%;
      height: auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter:
        drop-shadow(-1px 0 0 var(--bg)) drop-shadow(1px 0 0 var(--bg)) drop-shadow(0 -1px 0 var(--bg)) drop-shadow(0 1px 0 var(--bg));
      transform-origin: center center;
    }

    .symbol.left .side-gif {
      transform: translateX(-12px) scale(5.2);
    }

    .symbol.right .side-gif {
      transform: scale(4.1);
    }

    .asset-loader {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 1;
      transition: opacity .14s linear;
    }

    .loaded .asset-loader {
      opacity: 0;
    }

    .loader-bars {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          var(--bg) 0 12px,
          transparent 12px 20px);
      transform-origin: right center;
      animation: beigeWipe 1.15s steps(14, end) forwards;
    }

    .side-asset {
      position: relative;
      display: inline-block;
      transform-origin: center center;
    }

    .side-asset .side-gif {
      width: 100%;
      height: auto;
      display: block;
    }

    .globe-wrap .asset-loader {
      border-radius: 50%;
      overflow: hidden;
    }

    @keyframes beigeWipe {
      from {
        transform: scaleX(1);
      }

      to {
        transform: scaleX(0);
      }
    }

    .start-button {
      position: absolute;
      left: 50%;
      top: 62.5%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      padding: 10px 18px 8px;
      border: 2px solid var(--black);
      background: var(--white);
      color: var(--black);
      text-decoration: none;
      font-family: "LoRes 21 OT", monospace;
      font-size: clamp(20px, 2.2vw, 34px);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      z-index: 8;
    }

    .start-button:hover,
    .start-button:focus {
      background: var(--yellow);
      outline: none;
    }

    @media (max-width: 1100px) {
      .ui-version {
        max-width: min(42vw, 360px);
      }

      .symbol.left {
        left: 8%;
        width: 34%;
        height: 34%;
        top: 40%;
      }

      .symbol.right {
        right: 7%;
        width: 22%;
        height: 25%;
        top: 43%;
      }

      .symbol.center {
        width: 88vw;
        height: 110%;
        top: 55%;
      }

      .start-button {
        font-size: clamp(18px, 2.4vw, 30px);
        padding: 9px 16px 7px;
      }
    }

    @media (max-width: 820px) {
      .graphic-stage::before {
        inset: 14px;
      }

      .ui-label {
        top: 26px;
        left: 26px;
        max-width: 170px;
      }

      .ui-version {
        top: 26px;
        right: 26px;
        max-width: 40vw;
        font-size: 10px;
      }

      .symbol.left {
        left: 4%;
        width: 36%;
        height: 25%;
        top: 45%;
      }

      .symbol.right {
        right: 4%;
        width: 23%;
        height: 18%;
        top: 47%;
      }

      .symbol.center {
        width: 100vw;
        height: 105%;
        top: 55%;
      }

      .start-button {
        font-size: clamp(18px, 3.4vw, 26px);
        padding: 8px 14px 6px;
      }
    }

    @media (max-width: 640px) {
      .graphic-stage::before {
        inset: 10px;
      }

      .ui-label {
        top: 18px;
        left: 18px;
        font-size: 10px;
        max-width: 140px;
      }

      .ui-version {
        top: 18px;
        right: 18px;
        font-size: 9px;
        max-width: 44vw;
      }

      .symbol.left {
        left: 0%;
        width: 40%;
        height: 18%;
        top: 49%;
      }

      .symbol.right {
        right: 1%;
        width: 25%;
        height: 13%;
        top: 50%;
      }

      .symbol.center {
        width: 114vw;
        height: 98%;
        top: 56%;
      }

      .start-button {
        font-size: clamp(16px, 4.6vw, 22px);
        padding: 7px 12px 5px;
      }
    }
  </style>
</head>

<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
    <filter id="bitmapTransparentBG">
      <feColorMatrix type="saturate" values="0" result="gray" />
      <feComponentTransfer in="gray" result="maskRGB">
        <feFuncR type="discrete" tableValues="1 1 1 0 0" />
        <feFuncG type="discrete" tableValues="1 1 1 0 0" />
        <feFuncB type="discrete" tableValues="1 1 1 0 0" />
      </feComponentTransfer>
      <feColorMatrix in="maskRGB" type="luminanceToAlpha" result="maskAlpha" />
      <feFlood flood-color="#000000" result="solidBlack" />
      <feComposite in="solidBlack" in2="maskAlpha" operator="in" />
    </filter>

    <filter id="bitmapTwoToneBeige">
      <feColorMatrix in="SourceGraphic" type="saturate" values="0" result="gray" />
      <feComponentTransfer in="gray">
        <feFuncR type="discrete" tableValues="0 0 0 0.886 0.886" />
        <feFuncG type="discrete" tableValues="0 0 0 0.863 0.863" />
        <feFuncB type="discrete" tableValues="0 0 0 0.769 0.769" />
        <feFuncA type="identity" />
      </feComponentTransfer>
    </filter>
  </svg>

  <div class="top-bar"></div>

  <div class="nav">
    <a href="homepage.html">Home</a>
    <a href="index.html">Start</a>
    <a href="archivecatalogue.html">Catalogue</a>
    <a href="emulators.html">Emulators</a>
    <a href="timeline.html">Timeline</a>
    <a href="regionsmap.html">Regions Map</a>
    <a href="art-archive.html">Art Archive</a>
    <a href="about.html">About</a>
  </div>

  <div class="frame">
    <div class="graphic-stage">
      <div class="ui-label">Balance of Power</div>
      <div class="ui-version">Videogame Propaganda Archive 1980-2000</div>

      <div class="art-layer">
        <div class="symbol left">
          <div class="bitmap-wrap side-wrap">
            <div class="side-asset eagle-asset">
              <img class="side-gif" id="eagleGif" alt="Eagle emblem"
                src="./eagle_working_twotone_chunky_transparent_less-pixelated.gif" />
              <div class="asset-loader" aria-hidden="true">
                <div class="loader-bars"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="symbol center">
          <div class="globe-wrap">
            <canvas class="globe-canvas" id="globeCanvas" width="260" height="260" aria-label="Spinning globe"></canvas>
            <div class="asset-loader" aria-hidden="true">
              <div class="loader-bars"></div>
            </div>
          </div>
        </div>

        <div class="symbol right">
          <div class="bitmap-wrap side-wrap">
            <div class="side-asset hammer-asset">
              <img class="side-gif" id="hammerGif" alt="Hammer and sickle emblem"
                src="./hammer_twotone_chunky_transparent.gif" />
              <div class="asset-loader" aria-hidden="true">
                <div class="loader-bars"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <a class="start-button" href="homepage.html">Start</a>
    </div>
  </div>

      function putPixel(imageData, x, y, r, g, b, a) {
        if (x < 0 || y < 0 || x >= W || y >= H) return;
        const idx = (y * W + x) * 4;
        imageData.data[idx] = r;
        imageData.data[idx + 1] = g;
        imageData.data[idx + 2] = b;
        imageData.data[idx + 3] = a;
      }

      textureImg.onload = function () {
        const texCanvas = document.createElement('canvas');
        texCanvas.width = textureImg.width;
        texCanvas.height = textureImg.height;
        const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
        texCtx.drawImage(textureImg, 0, 0);
        const tex = texCtx.getImageData(0, 0, texCanvas.width, texCanvas.height).data;

        function sampleLand(u, v) {
          const x = Math.max(0, Math.min(texCanvas.width - 1, Math.floor((((u % 1) + 1) % 1) * texCanvas.width)));
          const y = Math.max(0, Math.min(texCanvas.height - 1, Math.floor(v * texCanvas.height)));
          const i = (y * texCanvas.width + x) * 4;
          return tex[i] < 64;
        }

        function renderGlobe(rotation) {
          const frame = ctx.createImageData(W, H);
          for (let i = 0; i < frame.data.length; i += 4) {
            frame.data[i + 3] = 0;
          }

          // Pass 1: fill the globe interior with the page beige.
          for (let py = 0; py < H; py++) {
            for (let px = 0; px < W; px++) {
              const nx = (px - CX) / radius;
              const ny = (py - CY) / radius;
              const rr = nx * nx + ny * ny;
              if (rr > 1) continue;
              putPixel(frame, px, py, 226, 220, 196, 255);
            }
          }

          // Pass 2: draw explicit graticule curves so the latitude lines
          // project correctly all the way toward the poles.
          const deg = Math.PI / 180;

          // Latitude lines: frequent and 1px-looking.
          for (let latDeg = -80; latDeg <= 80; latDeg += 10) {
            const phi = latDeg * deg;
            for (let lonDeg = -180; lonDeg <= 180; lonDeg += 0.5) {
              const lambda = lonDeg * deg;
              const lam = lambda - rotation;

              const cosPhi = Math.cos(phi);
              const z = cosPhi * Math.cos(lam);
              if (z < 0) continue;

              const x = CX + radius * cosPhi * Math.sin(lam);
              const y = CY - radius * Math.sin(phi);

              putPixel(frame, Math.round(x), Math.round(y), 0, 0, 0, 175);
            }
          }

          // Add a couple of high-latitude rings so the top/bottom read better.
          for (const latDeg of [-85, 85]) {
            const phi = latDeg * deg;
            for (let lonDeg = -180; lonDeg <= 180; lonDeg += 0.5) {
              const lambda = lonDeg * deg;
              const lam = lambda - rotation;

              const cosPhi = Math.cos(phi);
              const z = cosPhi * Math.cos(lam);
              if (z < 0) continue;

              const x = CX + radius * cosPhi * Math.sin(lam);
              const y = CY - radius * Math.sin(phi);

              putPixel(frame, Math.round(x), Math.round(y), 0, 0, 0, 175);
            }
          }

          // Longitude lines: a little lighter than the latitude lines.
          for (let lonDeg = -180; lonDeg < 180; lonDeg += 18) {
            const lambda = lonDeg * deg;
            for (let latDeg = -89; latDeg <= 89; latDeg += 0.5) {
              const phi = latDeg * deg;
              const lam = lambda - rotation;

              const cosPhi = Math.cos(phi);
              const z = cosPhi * Math.cos(lam);
              if (z < 0) continue;

              const x = CX + radius * cosPhi * Math.sin(lam);
              const y = CY - radius * Math.sin(phi);

              putPixel(frame, Math.round(x), Math.round(y), 0, 0, 0, 135);
            }
          }

          // Pass 3: draw land on top, so the continents can cross over the grid.
          for (let py = 0; py < H; py++) {
            for (let px = 0; px < W; px++) {
              const nx = (px - CX) / radius;
              const ny = (py - CY) / radius;
              const rr = nx * nx + ny * ny;
              if (rr > 1) continue;

              const nz = Math.sqrt(1 - rr);
              const lat = Math.asin(Math.max(-1, Math.min(1, -ny)));
              let lon = Math.atan2(nx, nz) + rotation;

              const u = (lon + Math.PI) / (2 * Math.PI);
              const v = (Math.PI / 2 - lat) / Math.PI;

              const land = sampleLand(u, v);
              if (land) {
                putPixel(frame, px, py, 0, 0, 0, 255);
              }
            }
          }

          // Crisp outline.
          for (let a = 0; a < Math.PI * 2; a += 0.004) {
            const x = Math.round(CX + Math.cos(a) * radius);
            const y = Math.round(CY + Math.sin(a) * radius);
            putPixel(frame, x, y, 0, 0, 0, 255);
          }

          ctx.putImageData(frame, 0, 0);
        }

        let last = 0;
        let rotation = 0;

        function tick(ts) {
          if (!last) last = ts;
          const dt = Math.min(32, ts - last);
          last = ts;
          rotation += dt * 0.00035;
          renderGlobe(rotation);
          requestAnimationFrame(tick);
        }

        renderGlobe(0);
        requestAnimationFrame(tick);
      };
    })();

  <script>
    (function () {
      const eagleGif = document.getElementById('eagleGif');
      const hammerGif = document.getElementById('hammerGif');
      const eagleAsset = document.querySelector('.eagle-asset');
      const hammerAsset = document.querySelector('.hammer-asset');

      function applyPixelatedSizing() {
        if (eagleAsset) {
          eagleAsset.style.width = '18%';
        }
        if (hammerAsset) {
          hammerAsset.style.width = '18%';
        }
        if (eagleGif) {
          eagleGif.style.height = 'auto';
          eagleGif.style.transform = 'translateX(-12px) scale(5.2)';
        }
        if (hammerGif) {
          hammerGif.style.height = 'auto';
          hammerGif.style.transform = 'scale(4.1)';
        }
      }

      function finishLoading() {
        document.body.classList.add('loaded');
      }

      window.addEventListener('resize', applyPixelatedSizing);
      if (eagleGif) eagleGif.addEventListener('load', applyPixelatedSizing);
      if (hammerGif) hammerGif.addEventListener('load', applyPixelatedSizing);

      window.addEventListener('load', function () {
        applyPixelatedSizing();
        setTimeout(finishLoading, 1180);
      });

      applyPixelatedSizing();
      setTimeout(applyPixelatedSizing, 100);
      setTimeout(finishLoading, 1350);
    })();
  </script>



  <script>
    (function () {
      let audioContext = null;

      function getAudioContext() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
        return audioContext;
      }

      function playTone(frequency, duration, volume, delay) {
        const ctx = getAudioContext();
        const startTime = ctx.currentTime + (delay || 0);
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(frequency, startTime);

        gain.gain.setValueAtTime(volume, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
      }

      function playClickSound() {
        playTone(620, 0.035, 0.045, 0);
        playTone(310, 0.025, 0.03, 0.025);
      }

      function playRunSound() {
        playTone(220, 0.045, 0.11, 0);
        playTone(440, 0.045, 0.10, 0.045);
        playTone(880, 0.055, 0.09, 0.09);
      }

      function isRunControl(element) {
        const control = element.closest('.button, button, a');
        if (!control) return false;

        const onclickValue = control.getAttribute('onclick') || '';
        const controlText = (control.textContent || '').trim().toLowerCase();

        return onclickValue.includes('toggleGame') || controlText === 'run' || controlText === 'stop';
      }

      function isClickableElement(element) {
        return element.closest('a, button, input, select, textarea, .button, .card-link, .nav-card, .region-card, .hotspot a, .start-button, .click-sound');
      }

      function shouldIgnoreSound(element) {
        return element.closest('.screen.running');
      }

      document.addEventListener('pointerdown', function (event) {
        const target = event.target;

        if (!target || shouldIgnoreSound(target) || !isClickableElement(target)) {
          return;
        }

        if (isRunControl(target)) {
          playRunSound();
        } else {
          playClickSound();
        }
      });

      document.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter' && event.key !== ' ') return;

        const target = event.target;

        if (!target || shouldIgnoreSound(target) || !isClickableElement(target)) {
          return;
        }

        if (isRunControl(target)) {
          playRunSound();
        } else {
          playClickSound();
        }
      });
    })();
  </script>
