<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Archive</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #e2dcc4;
      --blue: #0000ff;
      --black: #000000;
      --white: #ffffff;
      --yellow: #ffff00;
    }

    html {
      background: var(--blue);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--black);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .top-bar {
      height: 16px;
      background: var(--blue);
      border-bottom: 2px solid var(--black);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav {
      display: flex;
      gap: 22px;
      padding: 14px 22px 6px;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 500;
      flex-wrap: wrap;
      background: var(--bg);
      position: sticky;
      top: 16px;
      z-index: 90;
    }

    .nav a {
      color: var(--black);
      text-decoration: none;
    }

    body,
    a {
      cursor: url('./cursor.png') 5 4, auto;
    }

    a:hover {
      cursor: url('./cursor.png') 5 4, pointer;
    }

    .nav a:hover {
      background: var(--yellow);
    }
  </style>
</head>

<body>
  <div class="top-bar"></div>

  <div class="nav">
    <a href="homepage.html">Home</a>
    <a href="index.html">Start</a>
    <a href="archivecatalogue.html">Catalogue</a>
    <a href="emulators.html">Emulators</a>
    <a href="timeline.html">Timeline</a>
    <a href="regionsmap.html">Regions Map</a>
    <a href="art-archive.html">Art Archive</a>
    <a href="about.html">About</a>
  </div>


  <script>
    (function () {
      let audioContext = null;

      function getAudioContext() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
        return audioContext;
      }

      function playTone(frequency, duration, volume, delay) {
        const ctx = getAudioContext();
        const startTime = ctx.currentTime + (delay || 0);
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(frequency, startTime);

        gain.gain.setValueAtTime(volume, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
      }

      function playClickSound() {
        playTone(620, 0.035, 0.045, 0);
        playTone(310, 0.025, 0.03, 0.025);
      }

      function playRunSound() {
        playTone(220, 0.045, 0.11, 0);
        playTone(440, 0.045, 0.10, 0.045);
        playTone(880, 0.055, 0.09, 0.09);
      }

      function isRunControl(element) {
        const control = element.closest('.button, button, a');
        if (!control) return false;

        const onclickValue = control.getAttribute('onclick') || '';
        const controlText = (control.textContent || '').trim().toLowerCase();

        return onclickValue.includes('toggleGame') || controlText === 'run' || controlText === 'stop';
      }

      function isClickableElement(element) {
        return element.closest('a, button, input, select, textarea, .button, .card-link, .nav-card, .region-card, .hotspot a, .start-button, .click-sound');
      }

      function shouldIgnoreSound(element) {
        return element.closest('.screen.running');
      }

      document.addEventListener('pointerdown', function (event) {
        const target = event.target;

        if (!target || shouldIgnoreSound(target) || !isClickableElement(target)) {
          return;
        }

        if (isRunControl(target)) {
          playRunSound();
        } else {
          playClickSound();
        }
      });

      document.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter' && event.key !== ' ') return;

        const target = event.target;

        if (!target || shouldIgnoreSound(target) || !isClickableElement(target)) {
          return;
        }

        if (isRunControl(target)) {
          playRunSound();
        } else {
          playClickSound();
        }
      });
    })();
  </script>

</body>

</html>
